<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Все автосалоны</title>
</head>
<body>
{% if dealers %}
    {% for dealer in dealers %}
        {{ dealer.name }}
        {{ dealer.city }}
        {{ dealer.address }}
        {{ dealer.owner }}
    {% endfor %}
{% else %}
    <h1>Автосалоны отсутствуют</h1>
{% endif %}
</body>
</html>
